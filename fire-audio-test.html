<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Meowmoon Fire Audio Test v0.4</title>
<style>
  html, body { margin:0; min-height:100%; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background:#dff5ff; color:#123; }
  main { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; box-sizing:border-box; }
  .card { max-width:760px; background:white; border-radius:28px; padding:28px; box-shadow:0 12px 30px rgba(0,0,0,.16); text-align:center; }
  h1 { font-size:clamp(28px, 6vw, 48px); margin:0 0 14px; }
  p { font-size:clamp(18px, 3.5vw, 24px); line-height:1.35; }
  button { font-size:clamp(24px,5vw,38px); padding:22px 30px; border-radius:26px; border:0; background:#ffcc33; box-shadow:0 8px 0 #c99000; margin:14px; }
  #log { text-align:left; white-space:pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background:#f3f6f8; padding:14px; border-radius:14px; font-size:14px; max-height:35vh; overflow:auto; }
</style>
</head>
<body>
<audio id="bachMusic" src="audio/jesu-joy-piano-loop.mp3" loop preload="auto" playsinline webkit-playsinline></audio>
<main>
  <div class="card">
    <h1>Meowmoon Fire Audio Test</h1>
    <p>Tap the large button. You should hear a short beep immediately and then the Bach MP3.</p>
    <button id="testBtn">Tap to test sound</button>
    <p>Use this only for troubleshooting. The real game is <strong>index.html</strong>.</p>
    <div id="log"></div>
  </div>
</main>
<script>
(() => {
  const logEl = document.getElementById('log');
  const audio = document.getElementById('bachMusic');
  let ctx = null;
  function log(msg) {
    logEl.textContent += new Date().toLocaleTimeString() + '  ' + msg + '\n';
    logEl.scrollTop = logEl.scrollHeight;
  }
  function context() {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!ctx && AC) ctx = new AC();
    return ctx;
  }
  function beep() {
    const c = context();
    if (!c) { log('No AudioContext available.'); return; }
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.frequency.value = 660;
    gain.gain.setValueAtTime(0.001, c.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.18, c.currentTime + 0.025);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.35);
    osc.connect(gain);
    gain.connect(c.destination);
    osc.start(c.currentTime);
    osc.stop(c.currentTime + 0.38);
    log('Tried Web Audio beep. Context state: ' + c.state);
  }
  function testSound() {
    log('Gesture received.');
    const c = context();
    const resume = c && c.state === 'suspended' ? c.resume() : Promise.resolve();
    resume.then(() => {
      log('AudioContext after resume: ' + (c ? c.state : 'none'));
      beep();
    }).catch(err => log('AudioContext resume error: ' + err));
    audio.muted = false;
    audio.volume = 1;
    const promise = audio.play();
    if (promise && typeof promise.then === 'function') {
      promise.then(() => log('HTML audio play() resolved. paused=' + audio.paused + ' currentTime=' + audio.currentTime.toFixed(2)))
        .catch(err => log('HTML audio play() rejected: ' + err.name + ': ' + err.message));
    } else {
      log('HTML audio play() returned no Promise. paused=' + audio.paused);
    }
    setTimeout(() => {
      log('After 1500ms: paused=' + audio.paused + ' currentTime=' + audio.currentTime.toFixed(2) + ' readyState=' + audio.readyState + ' networkState=' + audio.networkState);
    }, 1500);
  }
  ['pointerdown','touchstart','click'].forEach(name => {
    document.getElementById('testBtn').addEventListener(name, testSound, {passive:true});
  });
  log('Ready. userAgent=' + navigator.userAgent);
})();
</script>
</body>
</html>
