<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Meowmoon Fire Audio Test v0.5</title>
<style>
  html, body { margin:0; min-height:100%; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background:#dff5ff; color:#123; }
  main { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; }
  .card { width:min(900px, 100%); background:white; border-radius:28px; padding:24px; box-shadow:0 12px 30px rgba(0,0,0,.16); text-align:center; }
  h1 { font-size:clamp(26px, 6vw, 44px); margin:0 0 12px; }
  p { font-size:clamp(17px, 3.2vw, 22px); line-height:1.35; }
  button, a.testlink { display:inline-block; font-size:clamp(20px,4vw,30px); padding:18px 24px; border-radius:24px; border:0; background:#ffcc33; color:#123; text-decoration:none; box-shadow:0 7px 0 #c99000; margin:10px; }
  button.secondary { background:#7ee2ff; box-shadow:0 7px 0 #1596b5; }
  button.third { background:#8df58d; box-shadow:0 7px 0 #3aa53a; }
  #log { text-align:left; white-space:pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background:#f3f6f8; padding:14px; border-radius:14px; font-size:13px; max-height:34vh; overflow:auto; }
</style>
</head>
<body>
<audio id="m4aMusic" src="audio/jesu-joy-piano-loop.m4a" loop preload="auto" playsinline webkit-playsinline></audio>
<audio id="oggMusic" src="audio/jesu-joy-piano-loop.ogg" loop preload="auto" playsinline webkit-playsinline></audio>
<audio id="mp3Music" src="audio/jesu-joy-piano-loop.mp3" loop preload="auto" playsinline webkit-playsinline></audio>
<main>
  <div class="card">
    <h1>Meowmoon Fire Audio Test v0.5</h1>
    <p>Tap each button. This version tests a loud Web Audio tone and three music formats.</p>
    <button id="beepBtn">Test loud Web Audio tone</button>
    <button id="m4aBtn" class="secondary">Test AAC / M4A music</button>
    <button id="oggBtn" class="third">Test OGG music</button>
    <button id="mp3Btn">Test MP3 music</button>
    <p>Direct file tests:</p>
    <a class="testlink" href="audio/jesu-joy-piano-loop.m4a">Open M4A</a>
    <a class="testlink" href="audio/jesu-joy-piano-loop.ogg">Open OGG</a>
    <a class="testlink" href="audio/jesu-joy-piano-loop.mp3">Open MP3</a>
    <p>Use this only for troubleshooting. The real game is <strong>index.html</strong>.</p>
    <div id="log"></div>
  </div>
</main>
<script>
(() => {
  const logEl = document.getElementById('log');
  const players = {
    m4a: document.getElementById('m4aMusic'),
    ogg: document.getElementById('oggMusic'),
    mp3: document.getElementById('mp3Music')
  };
  let ctx = null;
  let lastRun = 0;
  function log(msg) {
    logEl.textContent += new Date().toLocaleTimeString() + '  ' + msg + '\n';
    logEl.scrollTop = logEl.scrollHeight;
  }
  function context() {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!ctx && AC) ctx = new AC();
    return ctx;
  }
  function stopPlayers() {
    Object.values(players).forEach((audio) => {
      try { audio.pause(); audio.currentTime = 0; } catch (_) {}
    });
  }
  async function runOnce(fn) {
    const t = Date.now();
    if (t - lastRun < 180) return;
    lastRun = t;
    try { await fn(); } catch (error) { log('Error: ' + error.name + ': ' + error.message); }
  }
  async function loudBeep() {
    log('Gesture received for Web Audio tone.');
    stopPlayers();
    const c = context();
    if (!c) { log('No AudioContext available.'); return; }
    if (c.state === 'suspended') await c.resume();
    log('AudioContext state: ' + c.state);
    const osc1 = c.createOscillator();
    const osc2 = c.createOscillator();
    const gain = c.createGain();
    osc1.type = 'sine';
    osc2.type = 'triangle';
    osc1.frequency.setValueAtTime(523.25, c.currentTime);
    osc2.frequency.setValueAtTime(659.25, c.currentTime);
    gain.gain.setValueAtTime(0.001, c.currentTime);
    gain.gain.linearRampToValueAtTime(0.75, c.currentTime + 0.05);
    gain.gain.setValueAtTime(0.75, c.currentTime + 1.0);
    gain.gain.linearRampToValueAtTime(0.001, c.currentTime + 1.3);
    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(c.destination);
    osc1.start(c.currentTime);
    osc2.start(c.currentTime);
    osc1.stop(c.currentTime + 1.35);
    osc2.stop(c.currentTime + 1.35);
    log('Started loud Web Audio tone for about 1.3 seconds.');
  }
  async function playFormat(name) {
    log('Gesture received for ' + name.toUpperCase() + '.');
    stopPlayers();
    const audio = players[name];
    audio.muted = false;
    audio.defaultMuted = false;
    audio.volume = 1;
    audio.currentTime = 0;
    const c = context();
    if (c && c.state === 'suspended') await c.resume();
    try {
      await audio.play();
      log(name.toUpperCase() + ' play() resolved. paused=' + audio.paused + ' currentTime=' + audio.currentTime.toFixed(2) + ' readyState=' + audio.readyState);
    } catch (error) {
      log(name.toUpperCase() + ' play() rejected: ' + error.name + ': ' + error.message);
    }
    setTimeout(() => {
      log(name.toUpperCase() + ' after 1500ms: paused=' + audio.paused + ' currentTime=' + audio.currentTime.toFixed(2) + ' readyState=' + audio.readyState + ' networkState=' + audio.networkState);
    }, 1500);
  }
  document.getElementById('beepBtn').addEventListener('pointerup', () => runOnce(loudBeep));
  document.getElementById('m4aBtn').addEventListener('pointerup', () => runOnce(() => playFormat('m4a')));
  document.getElementById('oggBtn').addEventListener('pointerup', () => runOnce(() => playFormat('ogg')));
  document.getElementById('mp3Btn').addEventListener('pointerup', () => runOnce(() => playFormat('mp3')));
  ['beepBtn','m4aBtn','oggBtn','mp3Btn'].forEach((id) => {
    document.getElementById(id).addEventListener('click', (event) => {
      if (event.pointerType) return;
      const map = { beepBtn: loudBeep, m4aBtn: () => playFormat('m4a'), oggBtn: () => playFormat('ogg'), mp3Btn: () => playFormat('mp3') };
      runOnce(map[id]);
    });
  });
  log('Ready. userAgent=' + navigator.userAgent);
  log('HTMLAudioElement.canPlayType m4a=' + players.m4a.canPlayType('audio/mp4; codecs="mp4a.40.2"'));
  log('HTMLAudioElement.canPlayType ogg=' + players.ogg.canPlayType('audio/ogg; codecs="vorbis"'));
  log('HTMLAudioElement.canPlayType mp3=' + players.mp3.canPlayType('audio/mpeg'));
})();
</script>
</body>
</html>
