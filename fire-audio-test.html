<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Meowmoon Fire Audio Test - v0.8 rollback</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(#b9edff, #f4fbff);
      color: #17324d;
      padding: 24px;
      line-height: 1.4;
    }
    .card {
      max-width: 720px;
      margin: 0 auto;
      background: rgba(255,255,255,0.88);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    }
    h1 { font-size: 1.6rem; margin: 0 0 12px; }
    p { margin: 12px 0; }
    audio { width: 100%; margin: 14px 0 8px; }
    button, a.button {
      display: inline-block;
      appearance: none;
      border: 0;
      border-radius: 16px;
      background: #17324d;
      color: #fff;
      font-size: 1.1rem;
      padding: 14px 18px;
      margin: 8px 8px 8px 0;
      text-decoration: none;
    }
    pre {
      white-space: pre-wrap;
      background: #eef8ff;
      border-radius: 12px;
      padding: 12px;
      min-height: 80px;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Meowmoon Fire Audio Test - v0.8 rollback</h1>
    <p>This page is intentionally simple. It tests the same local MP3 used by the rollback game package.</p>

    <p><strong>Native browser audio controls:</strong></p>
    <audio id="music" src="audio/jesu-joy-piano-loop.mp3" controls preload="auto" playsinline webkit-playsinline></audio>

    <p>
      <button id="playButton">Tap to play with JavaScript</button>
      <a class="button" href="audio/jesu-joy-piano-loop.mp3" target="_blank" rel="noopener">Open MP3 directly</a>
    </p>

    <pre id="log"></pre>
  </main>

  <script>
    const audio = document.getElementById('music');
    const logEl = document.getElementById('log');
    const stamp = () => new Date().toLocaleTimeString();
    const log = (msg) => {
      logEl.textContent += `${stamp()}  ${msg}\n`;
    };

    log(`Ready. userAgent=${navigator.userAgent}`);
    log(`canPlayType mp3=${audio.canPlayType('audio/mpeg') || 'no'}`);

    document.getElementById('playButton').addEventListener('click', async () => {
      log('Button tapped.');
      try {
        audio.currentTime = 0;
        const result = audio.play();
        if (result && typeof result.then === 'function') await result;
        log(`play() resolved. paused=${audio.paused} currentTime=${audio.currentTime.toFixed(2)} readyState=${audio.readyState} networkState=${audio.networkState}`);
        setTimeout(() => {
          log(`After 1500ms: paused=${audio.paused} currentTime=${audio.currentTime.toFixed(2)} readyState=${audio.readyState} networkState=${audio.networkState} volume=${audio.volume} muted=${audio.muted}`);
        }, 1500);
      } catch (err) {
        log(`play() rejected: ${err.name}: ${err.message}`);
      }
    });

    audio.addEventListener('error', () => {
      const e = audio.error;
      log(`audio error code=${e ? e.code : 'unknown'}`);
    });
  </script>
</body>
</html>
